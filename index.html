<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaciones</title>

<style>
:root{
  --bg-url: url("https://i.imgur.com/q7GHWbv.jpeg"); /* 🔥 CAMBIA ESTA URL */
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background-image: var(--bg-url);
  background-size:cover;
  background-position:center;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  backdrop-filter: brightness(.9);
}

.card{
  background: rgba(255,255,255,.85);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  width:400px;
}

h1{
  margin-top:0;
}

.message{
  background:#f4f4f4;
  padding:15px;
  border-radius:12px;
  margin-bottom:25px;
  font-style:italic;
}

.enter-box{
  width:150px;
  height:150px;
  margin:auto;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.enter-box:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<div class="card">
  <h1>Evaluaciones</h1>
  <div class="message">
    Presiona el cuadro para comenzar con el sistema de evaluación.
  </div>

  <div class="enter-box" onclick="goDashboard()">
    ENTRAR
  </div>
</div>

<script>
function goDashboard(){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
